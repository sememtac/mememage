name: Publish to PyPI

# Publishes `mememage` to PyPI on every GitHub Release.
#
# Uses PyPI Trusted Publishing (OIDC) — no API token is stored anywhere. One
# manual setup step on PyPI first (https://pypi.org/manage/account/publishing/):
# add a "pending publisher" for project `mememage`, owner `sememtac`, repo
# `mememage`, workflow `publish.yml`, environment `pypi`. The first Release then
# creates the project and claims the name; later Releases just publish new
# versions. Bump `version` in pyproject.toml and tag the Release to match.

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
