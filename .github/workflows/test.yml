name: Tests

# Core-package CI. Kept separate from the workshop repo's root test.yml, which
# references full-repo-only modules (mememage.core) + tests that don't ship in
# the allow-listed core package. publish-core.sh copies THIS file.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Verify zero-dep import (no optional deps)
        run: |
          pip install --no-deps -e .
          python -c "import mememage; from mememage import encode, decode, verify; from mememage.hashing import hash_fields; print('zero-dep import OK')"
